<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Server Test</title>
</head>
<body>
    <h1>Memory Server Test</h1>
    <input type="text" id="testInput" placeholder="Enter User ID" value="user123">
    <br><br>
    <button onclick="sendTest()">Send</button>
    <br><br>
    <div id="testResult" style="white-space: pre-wrap; border: 1px solid #ccc; padding: 10px; width: 500px; height: 300px; overflow-y: scroll;">
        这里将显示输出结果...
    </div>
    
    <script>
        function sendTest() {
            // 1. 获取输入框里的“字”
            const userInput = document.getElementById('testInput').value;
            
            // 2. 拼接字符串
            // 建议统一使用一种方式，这种反引号 `` 方式最不容易出错
            const url = `/stream?prompt=${encodeURIComponent(userInput)}`;
            
            // 3. 打印调试
            console.log(`生成的 URL 是: ${url}`);
            
            // 4. 【关键的最后一步】：把结果写到网页的 div 里
            // 你之前只定义了变量 outputDiv，但没给它赋值
            const outputDiv = document.getElementById('testResult');
            outputDiv.innerText = "成功生成地址：" + url; // 这一行把文字印上去
        }
    </script>
</body>
</html>
