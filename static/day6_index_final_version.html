<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TESLA AI - Cyber Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定义赛博朋克光影特效 */
        :root {
            --cyber-blue: #00f2fe;
            --cyber-green: #4facfe;
            --tesla-red: #e31937;
        }
        
        body {
            background-color: #050509; /* 极深蓝黑背景 */
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            overflow: hidden;
        }

        /* 自定义滚动条，更有科技感 */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 242, 254, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 242, 254, 0.5); }

        /* 呼吸灯动画 */
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(79, 172, 254, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(79, 172, 254, 0); }
            100% { box-shadow: 0 0 0 0 rgba(79, 172, 254, 0); }
        }
        .status-pulse {
            animation: pulse-green 2s infinite;
        }

        /* 打字机光标动画 */
        .typing-cursor::after {
            content: '|';
            animation: blink 1s infinite;
            color: var(--cyber-blue);
            margin-left: 2px;
            font-weight: bold;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* 消息气泡浮入动画 */
        @keyframes message-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-anim {
            animation: message-in 0.3s ease-out forwards;
        }

        /* 赛博边框光晕 */
        .cyber-border {
            position: relative;
            border: 1px solid rgba(0, 242, 254, 0.3);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.1);
        }
        .cyber-border::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            background: linear-gradient(45deg, var(--cyber-blue), transparent, var(--cyber-green));
            z-index: -1;
            border-radius: inherit;
            opacity: 0.15;
            filter: blur(5px);
        }
    </style>
</head>
<body class="text-gray-200 h-screen flex flex-col">

    <header class="p-5 border-b border-gray-800 flex justify-between items-center bg-black/40 backdrop-blur-xl z-10 sticky top-0 cyber-border">
        <div class="flex items-center gap-3">
            <span class="text-2xl font-black tracking-widest text-white">TESLA</span>
            <span class="text-2xl font-light text-cyan-400">AI</span>
            <span class="text-xs bg-gray-800 text-gray-400 px-2 py-1 rounded">CMD_CENTER_V1.0</span>
        </div>
        <div class="flex items-center gap-3 bg-gray-900 px-4 py-2 rounded-full border border-gray-800 shadow-inner">
            <span class="w-3 h-3 bg-cyan-500 rounded-full status-pulse"></span>
            <div class="text-sm font-mono text-cyan-100 tracking-wide">SYSTEM_ACTIVE</div>
        </div>
    </header>

    <main id="chat-window" class="flex-1 overflow-y-auto p-6 md:p-10 space-y-8 bg-[#080810]">
        <div class="flex justify-start message-anim">
            <div class="flex gap-3 max-w-[85%]">
                <div class="w-9 h-9 rounded-full bg-gray-800 flex items-center justify-center border border-gray-700 shadow-lg text-cyan-400 font-bold">T</div>
                <div class="bg-gray-900 p-4 rounded-2xl rounded-tl-none border border-gray-800 shadow-xl text-gray-100 leading-relaxed">
                    你好，Sheldon。我是你的特斯拉智能助手。我已连接 Day 5 数据库，拥有持久记忆。请下达指令。
                </div>
            </div>
        </div>
    </main>

    <footer class="p-6 bg-black/60 backdrop-blur-xl border-t border-gray-800 sticky bottom-0 z-10 cyber-border">
        <div class="max-w-5xl mx-auto">
            <div class="relative flex items-center group">
                <div class="absolute -inset-0.5 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-2xl blur opacity-20 group-hover:opacity-40 transition duration-1000 group-focus-within:opacity-50"></div>
                
                <input id="user-input" type="text" 
                    class="relative w-full bg-[#0d1117] border border-gray-700 rounded-2xl px-6 py-5 pr-20 focus:ring-1 focus:ring-cyan-500 outline-none transition-all text-white placeholder-gray-600 text-lg font-mono shadow-inner"
                    placeholder=">输入指令 [ENTER发送]...">
                
                <div id="send-btn" class="absolute right-3 p-3 bg-cyan-500 text-black rounded-xl cursor-pointer hover:bg-white transition-all active:scale-95 shadow-md flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 5l7 7-7 7M5 5l7 7-7 7" />
                    </svg>
                </div>
            </div>
            <p class="text-[11px] text-center mt-4 text-gray-600 uppercase tracking-widest font-mono">Model: Gemini Ultra 1.0 Pro | Persistence: Day 5 DB | Secured Connection</p>
        </div>
    </footer>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        let isGenerating = false; // 状态锁

        // 核心发送函数
        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || isGenerating) return;

            isGenerating = true;
            userInput.value = '';
            
            // 1. 渲染用户气泡
            appendBubble('user', text);

            // 2. 准备 AI 气泡 (加入 typing-cursor 特效)
            const aiBubbleId = 'ai-' + Date.now();
            const aiBubbleElement = appendBubble('assistant', '正在呼叫特斯拉大脑...', aiBubbleId);
            aiBubbleElement.classList.add('typing-cursor');

            // 3. 请求后端
            try {
                // 注意：URL 必须对应你的后端地址和参数
                const url = `http://127.0.0.1:8000/chat_stream?user_id=xueyuan&prompt=${encodeURIComponent(text)}`;
                const response = await fetch(url);
                
                if (!response.ok) throw new Error('网络请求失败');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                aiBubbleElement.innerText = ''; // 开始接字前清空提示

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    
                    // 过滤掉后端可能发送的系统提示字符
                    if (!chunk.includes('✅') && !chunk.includes('📜')) {
                        aiBubbleElement.innerText += chunk;
                        // 自动滚动到底部
                        chatWindow.scrollTop = chatWindow.scrollHeight;
                    }
                }
            } catch (err) {
                console.error('Error:', err);
                aiBubbleElement.innerHTML = `<span class="text-red-400">⚠️ 连接失败：请确认后端服务器 (Day 5) 已启动并在 8000 端口运行。</span>`;
            } finally {
                isGenerating = false;
                // 移除打字光标
                aiBubbleElement.classList.remove('typing-cursor');
            }
        }

        // 创建气泡的辅助函数
        function appendBubble(role, content, id = null) {
            const wrapper = document.createElement('div');
            // 加入浮入动画类和响应式布局
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} message-anim`;
            
            // 气泡内层
            const bubbleWrapper = document.createElement('div');
            bubbleWrapper.className = `flex gap-3 max-w-[85%] ${role === 'user' ? 'flex-row-reverse' : ''}`;

            // 头像
            const avatar = document.createElement('div');
            avatar.className = `w-9 h-9 rounded-full flex items-center justify-center border shrink-0 text-sm font-bold shadow-lg mt-1`;
            if (role === 'user') {
                avatar.className += ` bg-blue-950 border-blue-700 text-blue-200`;
                avatar.innerText = '雪';
            } else {
                avatar.className += ` bg-gray-800 border-gray-700 text-cyan-400`;
                avatar.innerText = 'T';
            }
            
            // 气泡主体
            const bubble = document.createElement('div');
            bubble.className = role === 'user' 
                ? 'bg-blue-600 p-4 rounded-2xl rounded-tr-none text-white shadow-xl border border-blue-500 font-sans leading-relaxed' 
                : 'bg-gray-900 p-4 rounded-2xl rounded-tl-none text-gray-100 shadow-xl border border-gray-800 font-sans leading-relaxed';
            
            if (id) bubble.id = id;
            bubble.innerText = content;
            
            // 组装
            bubbleWrapper.appendChild(avatar);
            bubbleWrapper.appendChild(bubble);
            wrapper.appendChild(bubbleWrapper);
            chatWindow.appendChild(wrapper);
            
            // 强制滚动到底部
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return bubble;
        }

        // 绑定点击事件
        sendBtn.onclick = handleSend;

        // 绑定回车事件 (防止在输入框回车导致页面刷新)
        userInput.onkeydown = (e) => {
            if (e.key === 'Enter') {
                e.preventDefault(); // 额外保险：阻止回车默认行为
                handleSend();
            }
        };
    </script>
</body>
</html>
