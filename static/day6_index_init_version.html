<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TESLA AI - 极简骨架</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white h-screen flex flex-col font-sans">

    <header class="p-4 border-b border-cyan-900/50 flex justify-between items-center bg-black/50">
        <div class="text-xl font-bold tracking-tighter">TESLA <span class="text-cyan-400">AI</span></div>
        <div class="text-xs text-cyan-500 border border-cyan-500 px-2 py-1 rounded">V1.0 ACTIVE</div>
    </header>

    <main id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-6">
        <div class="flex justify-start">
            <div class="bg-slate-900 border border-slate-800 p-3 rounded-lg max-w-[80%]">
                你好，雪媛。系统已就绪。
            </div>
        </div>
    </main>

    <footer class="p-4 bg-black border-t border-slate-800">
        <div class="max-w-4xl mx-auto flex gap-2">
            <input id="user-input" type="text" 
                class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-cyan-500 text-white"
                placeholder="输入指令...">
            
            <button id="send-btn" class="bg-cyan-500 text-black font-bold px-6 rounded-xl hover:bg-cyan-400 transition-colors">
                发送
            </button>
        </div>
    </footer>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        let isGenerating = false;

        // 【核心功能】发送与获取流式数据
        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || isGenerating) return;

            isGenerating = true;
            userInput.value = '';
            
            // 展示用户说的话
            appendBubble('user', text);

            // 创建 AI 的空气泡准备接字
            const aiBubble = appendBubble('assistant', '...');

            try {
                // Fetch 请求后端
                const url = `http://127.0.0.1:8000/chat_stream?user_id=xueyuan&prompt=${encodeURIComponent(text)}`;
                const response = await fetch(url);
                
                if (!response.ok) throw new Error('连接失败');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                aiBubble.innerText = ''; // 清空提示词，开始填入正式内容

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    // 核心逻辑：不停地把新拿到的字拼接到气泡里
                    if (!chunk.includes('✅')) {
                        aiBubble.innerText += chunk;
                        chatWindow.scrollTop = chatWindow.scrollHeight; // 自动滚到底
                    }
                }
            } catch (err) {
                aiBubble.innerText = "错误: " + err.message;
            } finally {
                isGenerating = false;
            }
        }

        // 【辅助功能】在屏幕上生成气泡
        function appendBubble(role, content) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const bubble = document.createElement('div');
            // Tailwind 这里的类名控制了气泡的样子
            bubble.className = `p-3 rounded-lg max-w-[85%] ${
                role === 'user' 
                ? 'bg-cyan-600 text-white' // 用户颜色
                : 'bg-slate-800 text-gray-100 border border-slate-700' // AI 颜色
            }`;
            bubble.innerText = content;

            wrapper.appendChild(bubble);
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return bubble;
        }

        sendBtn.onclick = handleSend;
        userInput.onkeydown = (e) => { if (e.key === 'Enter') handleSend(); };
    </script>
</body>
</html>
