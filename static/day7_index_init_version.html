<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TESLA AI - 极简骨架</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* 核心：让 Markdown 里的代码和换行生效 */
        #chat-window div {
            line-height: 1.6; /* 让行间距舒服一点 */
        }
        #chat-window strong {
            color: #22d3ee; /* 加粗的字变青色 */
        }
        #chat-window p {
            margin-bottom: 0.5rem; /* 段落之间留点空隙 */
        }
    </style>
</head>

<body class="bg-slate-950 text-white h-screen flex flex-col font-sans">

    <header class="p-4 border-b border-cyan-900/50 flex justify-between items-center bg-black/50">
        <div class="text-xl font-bold tracking-tighter">TESLA <span class="text-cyan-400">AI</span></div>
        <div class="text-xs text-cyan-500 border border-cyan-500 px-2 py-1 rounded">V1.0 ACTIVE</div>
    </header>

    <main id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-6">
        <div class="flex justify-start">
            <div class="bg-slate-900 border border-slate-800 p-3 rounded-lg max-w-[80%]">
                你好，Sheldon。系统已就绪。
            </div>
        </div>
    </main>

    <footer class="p-4 bg-black border-t border-slate-800">
        <div class="max-w-4xl mx-auto flex gap-2">
            <input id="user-input" type="text" 
                class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-cyan-500 text-white"
                placeholder="输入指令...">
            
            <button id="send-btn" class="bg-cyan-500 text-black font-bold px-6 rounded-xl hover:bg-cyan-400 transition-colors">
                发送
            </button>
        </div>
    </footer>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        let isGenerating = false;

        // 【核心功能】发送与获取流式数据
        async function handleSend() { // 处理发送操作并以流式方式接收 AI 响应
            const text = userInput.value.trim(); // 读取输入框内容并去除首尾空白(处理用户输入时的标准动作)
            if (!text || isGenerating) return; // 如果为空或正在生成中则直接返回，防止重复请求

            isGenerating = true; // 标记正在生成，防止并发发送
            userInput.value = ''; // 清空输入框的内容，给用户即时反馈
            
            // 展示用户说的话
            appendBubble('user', text); // 在聊天窗口追加一个用户气泡并显示用户输入

            // 创建 AI 的空气泡准备接字
            const aiBubble = appendBubble('assistant', '系统正在接入神经元...'); // 在聊天窗口追加一个 AI 气泡，初始显示省略号
            // 给气泡加上蓝色文字和呼吸灯动画
            aiBubble.classList.add('animate-pulse', 'text-cyan-400', 'italic');

            try {
                // Fetch 请求后端
                const url = `http://127.0.0.1:8000/chat_stream?user_id=xueyuan&prompt=${encodeURIComponent(text)}`; // 构造后端流式接口的 URL，并对用户输入做编码
                const response = await fetch(url); // 发起网络请求，等待响应对象
                
                if (!response.ok) throw new Error('连接失败'); // 如果 HTTP 状态不是 2xx，则抛出错误

                const reader = response.body.getReader(); // 从响应体获取流的读取器（用于逐块读取数据,数据只要有更新就会被读取）
                const decoder = new TextDecoder(); // TextDecoder就是创建文本解码器，把二进制块解码为字符串(变成我们看得懂的样子)
                aiBubble.innerText = ''; // 清空 AI 气泡中的占位符，准备写入真正的返回内容
                aiBubble.classList.remove('animate-pulse', 'italic'); // 移除动画，恢复正常字体

                let fullContent = ""; // 用一个变量存完整的文本内容，以便支持 Markdown 解析
                while (true) { // 持续循环读取流直到结束
                    const { value, done } = await reader.read(); // 读取下一块数据，得到二进制值和结束标志(value得到的是一串二进制数据，done是一个布尔值，表示流是否已经结束)
                    if (done) break; // 若已结束，则跳出循环
                    
                    const chunk = decoder.decode(value); // 将本次读取到的二进制数据解码成字符串
                    // 核心逻辑：不停地把新拿到的字拼接到气泡里
                    if (!chunk.includes('✅')) { // 如果 chunk 中不包含结束标记（'✅'），则拼接显示
                        fullContent += chunk; // 累积完整内容以便支持 Markdown 解析  
                        aiBubble.innerHTML = marked.parse(fullContent); // 将新内容追加到 AI 气泡文本中，实现流式渲染效果（支持 Markdown）
                        chatWindow.scrollTop = chatWindow.scrollHeight; // 自动滚动到最底部，保证最新消息可见
                    }
                }
            } catch (err) {
                // 这里就是第一阶段的“防守”逻辑
                aiBubble.classList.remove('animate-pulse'); // 停止闪烁
                aiBubble.innerHTML = `<span class="text-red-500 font-bold">⚠️ 诊断异常:</span> ${err.message}`;
                console.error("连接中断:", err);
            } finally {
                isGenerating = false; // 无论成功或失败，都重置生成状态，允许下一次发送
            }
        }

        // 【辅助功能】在屏幕上生成气泡
        function appendBubble(role, content) { // 创建并插入一个聊天气泡，返回该气泡元素以便后续更新
            const wrapper = document.createElement('div'); // 创建外层容器元素用于包裹气泡
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`; // 根据角色设置容器的对齐：用户靠右，AI靠左
            
            const bubble = document.createElement('div'); // 创建实际显示文本的气泡元素
            // Tailwind 这里的类名控制了气泡的样子
            bubble.className = `p-3 rounded-lg max-w-[85%] ${ // 设置内边距、圆角和最大宽度
                role === 'user'  // 判断角色以选择配色
                ? 'bg-cyan-600 text-white' // 用户颜色：青色背景 + 白色文字
                : 'bg-slate-800 text-gray-100 border border-slate-700' // AI 颜色：深色背景 + 浅色文字 + 边框
            }`;
            // 将传入的文本内容设置到气泡中以便显示，支持 Markdown 解析
            bubble.innerHTML = typeof marked !== 'undefined' ? marked.parse(content) : content;

            wrapper.appendChild(bubble); // 把气泡元素放入外层容器
            chatWindow.appendChild(wrapper); // 把外层容器追加到聊天窗口，实际显示在页面上
            chatWindow.scrollTop = chatWindow.scrollHeight; // 滚动聊天窗口到最底部，保证新气泡可见
            return bubble; // 返回气泡元素，调用方可以继续修改或更新文本
        }

        // 鼠标点击“发送”按钮时触发：调用 `handleSend` 发起请求并显示用户消息
        sendBtn.onclick = handleSend; // 点击发送按钮时调用 handleSend
        // 在输入框按下键时触发：按下 Enter 键时调用 `handleSend`，实现回车发送交互
        userInput.onkeydown = (e) => { if (e.key === 'Enter') handleSend(); }; // 回车发送

        //         const data = await response.json();

        //                 // 根据前缀拆分角色和内容，并把对应的消息渲染成气泡
